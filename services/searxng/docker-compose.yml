# scout meta — SearXNG metasearch backend (opt-in discovery layer)
#
# Started by `scout meta` (the launcher), never on the default `scout` path.
# Default scout is zero-dependency and never references this file.
#
# scout-specific container_name so this does not clash with any other SearXNG
# container during the retirement window of the old agents-bin service.
# No secret lives here — the launcher generates secret_key into the installed
# settings.yml on first `meta` start (see install.sh `meta)` arm).
services:
  searxng:
    image: searxng/searxng
    container_name: scout-searxng
    restart: unless-stopped
    ports:
      - "8911:8080"
    volumes:
      - ./config/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8911/
