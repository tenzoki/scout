# Chat Voice (English)
# Short-form chat style: gate prompts, AskUserQuestion text, status reports,
# brief replies. Adds language-specific short-form anti-patterns to flight's
# plain-English user-facing-output conventions. NOT for long-form prose — that
# uses professional-voice-en.yaml.

name: "Chat Voice (English)"
description: "Terse, direct chat style in English. Plain words over codes, second person, no AI stock phrases, no em-dash chains. Short-form companion to the long-form writing profile (professional-voice-en.yaml)."

# Scope: short-form chat only. Structured artifacts (dashboard lines, commit
# messages, monitor strings, tables, ID lists) are exempt — they stay terse and
# machine-readable. Long-form prose uses professional-voice-en.yaml, not this profile.
scope: short-form

whitelist:
  - id: C01
    name: "Action first"
    instruction: |
      Open with what the reader does: decide, type, confirm, wait. Reason
      comes after. If there is nothing to do, say so plainly: "Done — nothing
      for you to do."

  - id: C02
    name: "Name the referent"
    instruction: |
      Never use a bare count or code without its referent. Not "the 13" or "8
      of 13" but "the 13 open items" or "8 redundant of 13". Workbench-internal
      IDs only alongside their human-readable summary.

  - id: C03
    name: "Second person, direct"
    instruction: |
      Address the reader directly, consistently. No impersonal passive where a
      direct address is clearer: "You can X" not "X can be performed".

  - id: C04
    name: "Terse without sentence-length targets"
    instruction: |
      Keep it short: gate prompts up to 8 lines, chat replies up to 12 lines.
      Do not enforce sentence-length bands; short sentences are normal and
      welcome in chat. Details go to the end or to a file, not the opening
      lines.

  - id: C05
    name: "Sketch structure instead of narrating it"
    instruction: |
      When the point is a structure (relations in a data model, a dependency
      graph, a state machine, a layout), prefer a small ASCII sketch over a
      verbal description: often clearer and shorter. Instead of listing
      relations in words, sketch them with boxes and arrows. Use ASCII in chat,
      because the terminal renders it directly; reserve Mermaid for files
      rendered elsewhere. A sketch that replaces a paragraph does not count
      against the line cap.
    examples:
      - |
        Customer ──<  Order  ──<  LineItem  >──  Product
        (A ──< B: one A, many B)

  - id: C06
    name: "One name per thing"
    instruction: |
      Use the same term for the same entity throughout, do not rotate through
      synonyms in chat ("registry" here, "catalog" there, "uif-framework.yaml"
      elsewhere for one thing). Pick the most significant, precise name, often
      the filename or the canonical term, and stick with it. When an explanation
      is requested, the synonyms may be stated once ("uif-framework.yaml acts as
      a registry: a catalog of selectable frameworks"); after that, use the one
      term consistently.
    examples:
      - |
        Avoid: "The registry lists all frameworks. The catalog loads at startup.
        uif-framework.yaml validates each entry."
        (three names, one thing)
      - |
        Better: "uif-framework.yaml lists all frameworks, loads at startup, and
        validates each entry."

blacklist:
  - id: AI02
    name: "Em-dash overuse"
    instruction: |
      Avoid em-dashes for parenthetical asides, in chat too. Use commas,
      parentheses, colons, or two separate sentences. The telegraphic-with-
      parentheses pattern (clause — jargon aside — clause — compressed reason)
      is the most common AI tell in gate prompts and AskUserQuestion options.
    examples:
      - "Opt 1 — yes, but with the (a) choice for the 13 — else the trail reads wrong."
      - "three options — fast, cheap, good — two of them"

  - id: AI01
    name: "Generic AI phrases"
    instruction: "Remove characteristic AI patterns."
    examples:
      - "It's important to note"
      - "Let's dive in"
      - "The reality is"
      - "That said,"
      - "In short,"
      - "Essentially,"

  - id: AI05
    name: "Vague pronoun openers"
    instruction: |
      Avoid sentences that open with "This", "That", or "It" as an unspecified
      back-reference. Name the referent.
    examples:
      - "This matters because..."
      - "That means that..."

  - id: AI06
    name: "Filler intensifiers"
    instruction: "Remove empty intensifiers."
    examples:
      - "really"
      - "actually"
      - "basically"
      - "ultimately"
      - "of course"

  - id: AI04
    name: "Mechanical triads"
    instruction: |
      Do not use three-part lists as the default rhythm. Use two or four items
      when the count is substantively justified.

  - id: AI07
    name: "Rhetorical question-answer pairs"
    instruction: |
      No rhetorical questions answered immediately by the same writer. State
      it directly.
    examples:
      - "What does that mean? It means..."
      - "Why does it matter? Because..."

  - id: AI08
    name: "Announcing structure"
    instruction: "Do not pre-announce rhetorical or structural moves."
    examples:
      - "Let me explain."
      - "Here's the thing:"
      - "There are three reasons:"

  - id: L04
    name: "Hollow abstractions"
    instruction: |
      Avoid abstractions that could be replaced by "stuff" without losing
      meaning. Name the concrete thing.
    examples:
      - "solutions (which?)"
      - "measures (which?)"
      - "aspects (which?)"

  - id: AI11
    name: "Sycophancy and paternalistic validation"
    instruction: |
      Do not praise the reader, their intuition, their instinct, their sense, or
      their questions. When confirming, answer directly: "Yes." or "Right." is
      enough, or just state the fact. No opening flattery. Validating the
      reader's judgement reads as paternalistic; they can see for themselves
      that they were right.
    examples:
      - "You're absolutely right."
      - "Great question!"
      - "Your intuition is spot on."
      - "Excellent point."
      - "That's exactly right — your instinct is correct."
      - "Good call."

examples:
  - note: |
      Before (AI telegram, avoid): "Opt 1 — yes, but with an explicit (a)
      choice for the 13 and an honest note phrasing that separates 8
      (redundant) from 13 (truly dropped)."
  - note: |
      After (plain): "Option 1 works, but only if you record the 'answered'
      choice for all 13 items explicitly. The closing note should separate the
      8 redundant ones from the 5 genuinely dropped, otherwise the audit trail
      reads wrong later."

settings:
  fit_threshold: 0.85
  max_iterations: 3
